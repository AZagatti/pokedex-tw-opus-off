# Git hooks — https://lefthook.dev
pre-commit:
  parallel: true
  commands:
    oxlint:
      glob: "*.{js,ts,svelte}"
      run: npx oxlint --config oxlint.config.ts {staged_files}
    oxfmt:
      # oxfmt formats JS/TS/JSON (not .svelte) — excluding svelte here avoids a
      # spurious "no target file" error when a commit stages only .svelte files.
      glob: "*.{js,ts,json,css}"
      run: npx oxfmt --config oxfmt.config.ts --check {staged_files}
    typecheck:
      run: npm run check

pre-push:
  commands:
    test:
      run: npm run test
