# Git hooks — https://lefthook.dev
pre-commit:
  parallel: true
  commands:
    oxlint:
      glob: "*.{js,ts,svelte}"
      run: npx oxlint --config oxlint.config.ts {staged_files}
    oxfmt:
      # oxfmt formats JS/TS/JSON/CSS/Markdown/HTML (not .svelte) — excluding
      # svelte avoids a spurious "no target file" error on svelte-only commits.
      # Matches CI's `format:check .` so docs can't slip through unformatted.
      glob: "*.{js,ts,json,css,md,html}"
      run: npx oxfmt --config oxfmt.config.ts --check {staged_files}
    typecheck:
      run: npm run check

pre-push:
  commands:
    test:
      run: npm run test
